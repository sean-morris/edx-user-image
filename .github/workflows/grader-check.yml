name: Grader Check

on:
  pull_request_target:
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/**'
      - 'images/**'

jobs:
  grader-check:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      # Authenticate to Docker Hub before repo2docker runs. repo2docker pulls
      # `docker.io/library/buildpack-deps:jammy` as its base image, and
      # GitHub-hosted runners share NAT IPs across all of GitHub Actions —
      # so anonymous pulls almost always hit Docker Hub's 100-pulls/6-hours
      # per-IP rate limit. Authenticating attributes the pull to our service
      # account instead of the shared IP pool. Account is the org-owned
      # `edxberkeleyci` service identity (see CLAUDE.md / org settings).
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build PR image
        uses: jupyterhub/repo2docker-action@master
        with:
          FORCE_REPO2DOCKER_VERSION: jupyter-repo2docker==2024.07.0
          IMAGE_NAME: edx-user-image
          NO_PUSH: true
          LATEST_TAG_OFF: false
          REPO_DIR: /srv/repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test script dependencies
        run: pip install requests "pyjwt[crypto]" nbformat pytz

      - name: Fetch notebooks
        env:
          GITHUB_APP_ID: ${{ vars.COURSE_CONTENT_READER_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.COURSE_CONTENT_READER_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.COURSE_CONTENT_READER_INSTALLATION_ID }}
        run: |
          python tests/fetch_test_notebooks.py --courses "88ex,88bx,88cx,8x"

      # repo2docker-action tags the locally-built image with the commit SHA
      # (e.g. edx-user-image:6f6660ff162e), not :latest. With NO_PUSH:true the
      # :latest tag is never created, so we discover whatever tag landed in the
      # local Docker daemon and pass it through to the test script.
      - name: Run grader.check tests
        run: |
          BUILT=$(docker images --format "{{.Repository}}:{{.Tag}}" \
            | grep "^edx-user-image:" \
            | grep -v ":latest" \
            | head -1)
          if [ -z "$BUILT" ]; then
            echo "No edx-user-image found in local Docker daemon"
            docker images
            exit 1
          fi
          echo "Testing against image: $BUILT"
          python tests/run_grader_check_tests.py --image "$BUILT"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} edx-user-image grader-check ${{ job.status }} — ${{ github.head_ref }} · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
